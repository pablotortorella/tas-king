<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FUN TasKing! — Gestión visual de tareas</title>
<script>
  // Aplica el tema ANTES de pintar (evita el flash claro→oscuro). Igual que en index.html.
  (function () {
    try {
      var t = localStorage.getItem("tasking-theme");
      if (t !== "dark" && t !== "light") {
        t = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
      }
      document.documentElement.setAttribute("data-theme", t);
    } catch (e) { /* localStorage puede fallar en modo privado; usar default claro */ }
  })();
</script>
<style>
  /* Candy Pop, la paleta oficial (#10) — landing no tiene selector de paleta
     por tablero, solo claro/oscuro. */
  :root {
    --accent: #9B5DE5;
    --header-bg: #7C3AED;
    --bg: #FBF7FF;
    --col-bg: #F1E9FB;
    --text: #362A4A;
    --muted: #8577A3;
    --card-bg: #FFFFFF;
    --border: #E4D6F5;
    --hero-grad-a: #7C3AED;
    --hero-grad-b: #4B2378;
    --drag-over-bg: #E4D6F5;
  }
  html[data-theme="dark"] {
    --accent: #C084FC;
    --header-bg: #4B2378;
    --bg: #1E1329;
    --col-bg: #281A38;
    --text: #F0E6FF;
    --muted: #B9A8D9;
    --card-bg: #332145;
    --border: #4A2F63;
    --hero-grad-a: #4B2378;
    --hero-grad-b: #1E1329;
    --drag-over-bg: #4A2F63;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: var(--bg); color: var(--text); }

  /* HERO */
  .hero { background: linear-gradient(135deg, var(--hero-grad-a) 0%, var(--hero-grad-b) 100%); color: white; padding: 72px 24px 88px; text-align: center; }
  .hero-logo { font-size: 52px; margin-bottom: 12px; display: block; }
  .hero-brand { font-size: 1.1rem; font-weight: 800; letter-spacing: .5px; opacity: .9; margin-bottom: 20px; }
  .hero h1 { font-size: clamp(1.8rem, 5vw, 2.8rem); font-weight: 800; margin-bottom: 18px; line-height: 1.2; }
  .hero p { font-size: 1.1rem; opacity: .88; max-width: 540px; margin: 0 auto 44px; line-height: 1.6; }
  .hero-cta {
    display: inline-flex; align-items: center; gap: 8px;
    background: #fff; color: var(--accent); font-weight: 700; font-size: 1rem;
    padding: 14px 32px; border-radius: 8px; text-decoration: none;
    box-shadow: 0 4px 20px rgba(0,0,0,.25); transition: transform .15s, box-shadow .15s;
  }
  .hero-cta:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(0,0,0,.3); }

  /* LANGUAGE SWITCHER */
  .lang-switcher {
    position: fixed; top: 12px; right: 16px; z-index: 200;
    display: flex; gap: 2px;
    background: rgba(0,0,0,.38); backdrop-filter: blur(6px);
    border-radius: 20px; padding: 4px 8px;
  }
  .lang-btn {
    background: none; border: none; cursor: pointer;
    font-size: 11px; font-weight: 700; color: rgba(255,255,255,.65);
    padding: 3px 7px; border-radius: 12px; letter-spacing: .3px;
    transition: background .15s, color .15s;
  }
  .lang-btn.active { background: rgba(255,255,255,.25); color: #fff; }
  .lang-btn:hover:not(.active) { color: #fff; }

  /* THEME SWITCHER */
  .theme-switcher {
    position: fixed; top: 12px; left: 16px; z-index: 200;
    background: rgba(0,0,0,.38); backdrop-filter: blur(6px);
    border-radius: 20px; padding: 4px;
  }
  .theme-switcher button { background: none; border: none; cursor: pointer; font-size: 15px; color: #fff; padding: 3px 7px; border-radius: 12px; }
  .theme-switcher button:hover { background: rgba(255,255,255,.25); }

  /* MINI BOARD MOCKUP */
  .mockup-section { background: linear-gradient(180deg, var(--col-bg) 0%, var(--bg) 100%); padding: 64px 24px; text-align: center; }
  .mockup-section h2 { font-size: 1.5rem; font-weight: 700; margin-bottom: 12px; color: var(--text); }
  .mockup-hint { font-size: 12px; color: var(--muted); margin-bottom: 28px; }
  .mini-board { display: flex; gap: 12px; overflow-x: auto; max-width: 900px; margin: 0 auto; padding-bottom: 8px; justify-content: center; }
  .mini-col { background: var(--col-bg); border-radius: 10px; padding: 12px; min-width: 160px; flex: 0 0 160px; transition: background .15s; }
  .mini-col.drag-over { background: var(--drag-over-bg); outline: 2px dashed var(--accent); outline-offset: -3px; }
  .mini-col-title { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .6px; margin-bottom: 10px; }
  .mini-cards-area { overflow: hidden; max-height: 190px; }
  .mini-card { background: var(--card-bg); color: var(--text); border-radius: 6px; padding: 10px 12px; margin-bottom: 8px; font-size: 11.5px; box-shadow: 0 1px 3px rgba(9,30,66,.12); text-align: left; line-height: 1.4; cursor: grab; user-select: none; transition: opacity .15s; }
  .mini-card:active { cursor: grabbing; }
  .mini-card.dragging { opacity: .3; }
  .mini-card small { color: var(--muted); font-size: 10px; }
  .mini-chip { display: inline-block; border-radius: 3px; padding: 1px 6px; font-size: 9px; font-weight: 700; color: white; margin-bottom: 4px; letter-spacing: .3px; text-transform: uppercase; }
  @keyframes celebrate-mini {
    0%   { background:#fff; box-shadow:0 0 0 0 rgba(255,215,0,0); }
    15%  { background:#fffde7; box-shadow:0 0 12px 4px #ffd700; }
    30%  { background:#f3e5f5; box-shadow:0 0 12px 4px #ce93d8; }
    45%  { background:#e8f5e9; box-shadow:0 0 12px 4px #66bb6a; }
    60%  { background:#e3f2fd; box-shadow:0 0 12px 4px #42a5f5; }
    75%  { background:#fff3e0; box-shadow:0 0 12px 4px #ffa726; }
    90%  { background:#fce4ec; box-shadow:0 0 12px 4px #f48fb1; }
    100% { background:#fff; box-shadow:0 1px 3px rgba(9,30,66,.12); }
  }
  .mini-card.celebrating { animation: celebrate-mini 1.4s ease-in-out; }
  #mini-confetti { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 9999; }

  /* FEATURES */
  .features { padding: 72px 24px; max-width: 960px; margin: 0 auto; }
  .features h2 { text-align: center; font-size: 1.5rem; font-weight: 700; margin-bottom: 48px; }
  .feature-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 24px; }
  .feature-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 28px 24px; box-shadow: 0 1px 4px rgba(9,30,66,.07); transition: box-shadow .15s, transform .15s; }
  .feature-card:hover { box-shadow: 0 4px 16px rgba(9,30,66,.12); transform: translateY(-2px); }
  .feature-icon { font-size: 30px; margin-bottom: 14px; display: block; }
  .feature-card h3 { font-size: 1rem; font-weight: 700; margin-bottom: 8px; }
  .feature-card p { font-size: .9rem; color: var(--muted); line-height: 1.6; }

  /* OSS */
  .oss-section { padding: 48px 24px; text-align: center; background: var(--card-bg); border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }
  .oss-section p { color: var(--muted); font-size: .95rem; max-width: 480px; margin: 12px auto 0; line-height: 1.6; }

  /* CTA BOTTOM */
  .cta-bottom { padding: 72px 24px; text-align: center; background: linear-gradient(135deg, var(--hero-grad-a) 0%, var(--hero-grad-b) 100%); color: white; }
  .cta-bottom h2 { font-size: 1.8rem; font-weight: 800; margin-bottom: 14px; }
  .cta-bottom p { opacity: .85; margin-bottom: 36px; font-size: 1rem; }
  .cta-bottom a { display: inline-flex; align-items: center; gap: 8px; background: #fff; color: var(--accent); font-weight: 700; font-size: 1rem; padding: 14px 32px; border-radius: 8px; text-decoration: none; box-shadow: 0 4px 20px rgba(0,0,0,.2); }
  .cta-bottom a:hover { opacity: .95; }

  /* FOOTER */
  footer { padding: 24px; text-align: center; font-size: .82rem; color: var(--muted); border-top: 1px solid var(--border); }
  footer a { color: var(--accent); text-decoration: none; }
  footer a:hover { text-decoration: underline; }
</style>
</head>

<!-- FEATURES -->

    </div>
    <div class="feature-card">
      <span class="feature-icon">🔍</span>

</section>

<!-- OSS -->

<!-- CTA BOTTOM -->

// ---- Detección y aplicación de idioma ----
function detectLang() {
  const saved = localStorage.getItem('tasking-lang');
  if (saved && T[saved]) return saved;
  const nav = (navigator.language || 'es').toLowerCase();
  if (nav.startsWith('zh')) return 'zh';
  if (nav.startsWith('de')) return 'de';
  if (nav.startsWith('pt')) return 'pt';
  if (nav.startsWith('en')) return 'en';
  return 'es';
}

function applyLang(lang) {
  localStorage.setItem('tasking-lang', lang);
  document.documentElement.lang = lang;
  document.title = T[lang]['page.title'];
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const val = T[lang][el.dataset.i18n];
    if (val !== undefined) el.innerHTML = val;
  });
  document.querySelectorAll('.lang-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.lang === lang);
  });
}

document.querySelectorAll('.lang-btn').forEach(btn => {
  btn.addEventListener('click', () => applyLang(btn.dataset.lang));
});

applyLang(detectLang());

// ---- Confetti (igual que el tablero real) ----
const canvas = document.getElementById('mini-confetti');
const ctx = canvas.getContext('2d');
const COLORS = ["#ffd700","#ff6b6b","#4ecdc4","#45b7d1","#96ceb4","#ff9ff3","#54a0ff","#5f27cd","#00d2d3","#ff9f43"];
let particles = [], rafId = null;

function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
window.addEventListener('resize', resize); resize();

function launchConfetti() {
  particles = Array.from({ length: 160 }, () => ({
    x: Math.random() * canvas.width, y: -10 - Math.random() * 40,
    r: 5 + Math.random() * 6,
    color: COLORS[Math.floor(Math.random() * COLORS.length)],
    angle: Math.random() * Math.PI * 2, spin: (Math.random() - .5) * .3,
    vx: (Math.random() - .5) * 6, vy: 3 + Math.random() * 5,
    gravity: .18 + Math.random() * .1, life: 1,
    decay: .012 + Math.random() * .008,
    shape: Math.random() > .5 ? 'rect' : 'circle',
  }));
  if (rafId) cancelAnimationFrame(rafId);
  step();
}

function step() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  particles = particles.filter(p => p.life > 0);
  for (const p of particles) {
    ctx.save(); ctx.globalAlpha = p.life; ctx.fillStyle = p.color;
    ctx.translate(p.x, p.y); ctx.rotate(p.angle);
    if (p.shape === 'rect') ctx.fillRect(-p.r/2, -p.r/4, p.r, p.r/2);
    else { ctx.beginPath(); ctx.arc(0, 0, p.r/2, 0, Math.PI*2); ctx.fill(); }
    ctx.restore();
    p.x += p.vx; p.y += p.vy; p.vy += p.gravity;
    p.angle += p.spin; p.life -= p.decay;
  }
  if (particles.length) rafId = requestAnimationFrame(step);
}

function celebrateCard(card) {
  launchConfetti();
  card.classList.remove('celebrating');
  void card.offsetWidth;
  card.classList.add('celebrating');
  card.addEventListener('animationend', () => card.classList.remove('celebrating'), { once: true });
}

// ---- Drag & drop entre columnas ----
let dragging = null;

document.querySelectorAll('.mini-card').forEach(card => {
  card.setAttribute('draggable', 'true');
  card.addEventListener('dragstart', () => {
    dragging = card;
    setTimeout(() => card.classList.add('dragging'), 0);
  });
  card.addEventListener('dragend', () => {
    card.classList.remove('dragging');
    dragging = null;
  });
});

document.querySelectorAll('.mini-col').forEach(col => {
  col.addEventListener('dragover', e => { e.preventDefault(); col.classList.add('drag-over'); });
  col.addEventListener('dragleave', e => { if (!col.contains(e.relatedTarget)) col.classList.remove('drag-over'); });
  col.addEventListener('drop', e => {
    e.preventDefault();
    col.classList.remove('drag-over');
    if (!dragging || col.contains(dragging)) return;
    col.querySelector('.mini-cards-area').appendChild(dragging);
    if (col.dataset.col === 'terminado') celebrateCard(dragging);
  });
});

})();
</script>
<script>
  function currentTheme() {
    return document.documentElement.getAttribute("data-theme") === "dark" ? "dark" : "light";
  }
  function syncThemeButton() {
    document.getElementById("themeBtn").textContent = currentTheme() === "dark" ? "☀️" : "🌙";
  }
  document.getElementById("themeBtn").addEventListener("click", () => {
    const next = currentTheme() === "dark" ? "light" : "dark";
    document.documentElement.setAttribute("data-theme", next);
    try { localStorage.setItem("tasking-theme", next); } catch (e) { /* modo privado */ }
    syncThemeButton();
  });
  syncThemeButton();
</script>
